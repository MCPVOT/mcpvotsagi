# Claudia-Enhanced Ultimate AGI System Configuration
# ================================================

# Claudia AI Configuration
claudia:
  enabled: true
  ollama_url: "http://localhost:11435"
  models:
    primary: "llama3.2:latest"
    fallback: "llama3.1:latest"
    coding: "codellama:latest"
    analysis: "llama3.2:latest"

  # Model Parameters
  parameters:
    temperature: 0.3
    top_p: 0.9
    top_k: 40
    num_predict: 1000
    context_length: 4096
    timeout: 30

  # Caching Configuration
  cache:
    enabled: true
    ttl: 300  # 5 minutes
    max_size: 1000

  # Performance Optimization
  optimization:
    parallel_requests: 3
    request_batching: true
    gpu_acceleration: true
    memory_optimization: true

# Service Configuration
services:
  jupiter_dashboard:
    enabled: true
    port: 8891
    claudia_enhanced: true
    priority: 1

  claudia_trading:
    enabled: true
    port: 8892
    requires_claudia: true
    priority: 2

  ultimate_trading:
    enabled: true
    port: 8893
    priority: 3

  watchyourlan:
    enabled: true
    port: 8894
    priority: 4

  cyberpunk_dashboard:
    enabled: true
    port: 8895
    priority: 5

# Trading Configuration
trading:
  # Risk Management
  risk_management:
    max_position_size: 0.1  # 10% of portfolio
    stop_loss_percentage: 0.05  # 5%
    take_profit_percentage: 0.15  # 15%
    max_daily_loss: 0.02  # 2%

  # AI Integration
  ai_integration:
    use_claudia_signals: true
    claudia_weight: 0.4
    technical_weight: 0.4
    sentiment_weight: 0.2

  # Trading Pairs
  pairs:
    - "SOL/USDC"
    - "BONK/SOL"
    - "JUP/SOL"
    - "RAY/SOL"
    - "WIF/SOL"

  # Timeframes
  timeframes:
    - "1m"
    - "5m"
    - "15m"
    - "1h"
    - "4h"

# Data Sources
data_sources:
  jupiter:
    enabled: true
    api_url: "https://quote-api.jup.ag/v6"
    websocket_url: "wss://quote-api.jup.ag/v6/ws"

  coingecko:
    enabled: true
    api_url: "https://api.coingecko.com/api/v3"
    rate_limit: 50  # requests per minute

  solana:
    enabled: true
    rpc_url: "https://api.mainnet-beta.solana.com"

  social_sentiment:
    enabled: true
    twitter_api: true
    reddit_api: true
    discord_api: true

# Dashboard Configuration
dashboard:
  theme: "cyberpunk"
  refresh_interval: 3  # seconds
  chart_history: 24  # hours

  # Features
  features:
    real_time_charts: true
    ai_recommendations: true
    risk_alerts: true
    performance_metrics: true
    social_sentiment: true

  # Layouts
  layouts:
    main:
      - "price_chart"
      - "ai_analysis"
      - "risk_metrics"
      - "portfolio_overview"

    advanced:
      - "multi_pair_analysis"
      - "claudia_insights"
      - "technical_indicators"
      - "social_sentiment"

# Monitoring Configuration
monitoring:
  enabled: true
  health_checks:
    interval: 30  # seconds
    timeout: 10

  # Performance Metrics
  metrics:
    response_time: true
    accuracy: true
    throughput: true
    resource_usage: true

  # Alerts
  alerts:
    high_response_time: 5  # seconds
    low_accuracy: 0.7
    high_resource_usage: 0.8

  # Logging
  logging:
    level: "INFO"
    file: "claudia_ecosystem.log"
    max_size: "100MB"
    backup_count: 5

# Security Configuration
security:
  api_keys:
    encryption: true
    rotation: true

  # Access Control
  access_control:
    enabled: true
    whitelist_ips: []
    rate_limiting: true

  # Data Privacy
  data_privacy:
    anonymize_logs: true
    data_retention: 30  # days

# Advanced Features
advanced:
  # Machine Learning
  ml:
    enabled: true
    model_training: true
    auto_tuning: true

  # Arbitrage
  arbitrage:
    enabled: true
    max_price_difference: 0.005  # 0.5%
    min_profit_margin: 0.001  # 0.1%

  # Portfolio Management
  portfolio:
    rebalancing: true
    auto_compounding: true
    tax_optimization: true

  # Integration
  integration:
    n8n_workflows: true
    external_apis: true
    webhook_support: true

# Environment Configuration
environment:
  development:
    debug: true
    mock_data: false
    test_mode: false

  production:
    debug: false
    mock_data: false
    test_mode: false
    performance_optimization: true

  testing:
    debug: true
    mock_data: true
    test_mode: true
