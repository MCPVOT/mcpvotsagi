# MCPVotsAGI Ecosystem Configuration
# ==================================

# Deployment mode: development, staging, production
mode: production

# Health and monitoring settings
health_check_interval: 30  # seconds
resource_check_interval: 60  # seconds
max_startup_time: 300  # seconds
enable_auto_recovery: true
enable_metrics: true

# Resource thresholds
resource_limits:
  cpu_threshold: 80  # percent
  memory_threshold: 85  # percent
  disk_threshold: 90  # percent

# Service configurations
services:
  # Core MCP Servers
  memory_mcp:
    enabled: true
    port: 3002
    priority: critical
    restart_policy: always
    health_check: ws://localhost:3002/health
    resource_limits:
      min_memory_gb: 0.5
      max_memory_gb: 4.0

  github_mcp:
    enabled: true
    port: 3001
    priority: high
    health_check: ws://localhost:3001/health
    env:
      GITHUB_TOKEN: "${GITHUB_TOKEN}"

  solana_mcp:
    enabled: true
    port: 3005
    priority: medium
    dependencies: [memory_mcp]
    health_check: ws://localhost:3005/health

  huggingface_mcp:
    enabled: false
    port: 3003
    priority: low
    env:
      HF_TOKEN: "${HUGGINGFACE_TOKEN}"

  browser_tools_mcp:
    enabled: true
    port: 3006
    priority: medium
    startup_timeout: 60

  # Advanced MCP Servers
  trilogy_agi:
    enabled: true
    port: 8000
    priority: high
    dependencies: [memory_mcp]
    health_check: ws://localhost:8000/health
    resource_limits:
      min_memory_gb: 1.0

  owl_framework:
    enabled: true
    port: 8010
    priority: medium
    dependencies: [memory_mcp]

  dgm_evolution:
    enabled: true
    port: 8013
    priority: medium
    dependencies: [memory_mcp, trilogy_agi]
    restart_policy: on-failure
    max_restarts: 5

  # AI Services
  ollama:
    enabled: true
    port: 11434
    priority: critical
    health_check: http://localhost:11434/api/tags
    startup_timeout: 120
    resource_limits:
      min_memory_gb: 4.0

  gemini_cli:
    enabled: true
    port: 8015
    priority: high
    env:
      GEMINI_API_KEY: "${GEMINI_API_KEY}"

  # Integration Services
  n8n:
    enabled: false
    port: 5678
    priority: low
    health_check: http://localhost:5678/healthz

  ipfs:
    enabled: true
    port: 5001
    priority: high
    health_check: http://localhost:5001/api/v0/id
    startup_timeout: 60

  # Security Services
  opencti_mcp:
    enabled: true
    port: 3007
    priority: high
    health_check: ws://localhost:3007/health
    env:
      OPENCTI_URL: "${OPENCTI_URL:-http://localhost:8080}"
      OPENCTI_TOKEN: "${OPENCTI_TOKEN}"

  # Main Dashboard
  oracle_agi:
    enabled: true
    port: 3011
    priority: low
    dependencies: [memory_mcp, github_mcp, solana_mcp]
    health_check: http://localhost:3011/api/status
    startup_timeout: 60
    resource_limits:
      min_memory_gb: 0.5

# Logging configuration
logging:
  level: INFO
  format: json
  output: 
    - console
    - file: logs/ecosystem.log
  rotation:
    max_size: 100MB
    max_files: 10

# Database settings
database:
  type: sqlite
  path: ecosystem_core.db
  backup:
    enabled: true
    interval: 86400  # 24 hours
    retention_days: 7

# Network settings
network:
  enable_cors: true
  allowed_origins: ["*"]
  rate_limiting:
    enabled: true
    requests_per_minute: 1000

# Performance optimization
performance:
  connection_pool_size: 20
  max_concurrent_services: 50
  startup_parallelism: 5

# Alerts and notifications
alerts:
  enabled: true
  channels:
    - type: log
      level: error
    - type: webhook
      url: "${ALERT_WEBHOOK_URL}"
      events: [service_down, resource_critical]

# Backup and recovery
backup:
  enabled: true
  schedule: "0 2 * * *"  # 2 AM daily
  destinations:
    - type: local
      path: backups/
    - type: ipfs
      enabled: true