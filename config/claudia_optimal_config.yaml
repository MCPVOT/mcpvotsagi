# Claudia Optimal Configuration - Based on Available Models
# Generated for Ultimate AGI System V3 - July 6, 2025

claudia:
  version: "3.0.0"
  mode: "production"

  # Top 3 Models - Only load when required by Claudia
  primary_models:
    reasoning: "deepseek-r1:latest"      # 5.2GB - Best for complex reasoning & trading
    coding: "qwen2.5-coder:latest"       # 4.7GB - Expert code analysis & optimization
    fast: "llama3.2:3b"                  # 2.0GB - Quick responses & real-time data

  # Model Selection Strategy - Top 3 Only
  model_selection:
    strategy: "top_3_adaptive"
    fallback_chain:
      - "deepseek-r1:latest"
      - "qwen2.5-coder:latest"
      - "llama3.2:3b"

    task_routing:
      trading_analysis: "deepseek-r1:latest"
      code_analysis: "qwen2.5-coder:latest"
      system_optimization: "qwen2.5-coder:latest"
      quick_responses: "llama3.2:3b"
      real_time_data: "llama3.2:3b"
      complex_reasoning: "deepseek-r1:latest"
      risk_assessment: "deepseek-r1:latest"

  # Trading Enhancement
  trading:
    primary_model: "deepseek-r1:latest"
    backup_model: "deepseek-r1:8b"
    analysis_depth: "deep"
    risk_assessment: "conservative"

  # Jupiter DEX Integration
  jupiter:
    analysis_model: "deepseek-r1:latest"
    price_prediction: "gemma3n:latest"
    trend_analysis: "llama3.1:8b"

  # Network Analysis
  network:
    security_model: "deepseek-r1:latest"
    device_analysis: "qwen2.5-coder:latest"
    threat_detection: "llama3.1:8b"

  # Resource Management
  resources:
    gpu_acceleration: true
    memory_optimization: true
    model_caching: true
    preload_models:
      - "deepseek-r1:latest"
      - "llama3.2:3b"
      - "qwen2.5-coder:latest"

  # API Configuration
  api:
    host: "localhost"
    port: 11434
    timeout: 30
    retry_attempts: 3
    batch_size: 4

  # Logging & Monitoring
  monitoring:
    performance_tracking: true
    model_switching: true
    response_quality: true
    resource_usage: true

# Environment Specific Settings
environment:
  development:
    debug_mode: true
    verbose_logging: true
    model_switching_logs: true

  production:
    debug_mode: false
    performance_optimization: true
    error_recovery: true
