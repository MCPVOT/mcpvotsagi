# Advanced DGM System Configuration
# ====================================

# Service Configuration
services:
  dgm_evolution_connector:
    port: 8081
    enabled: true
    auto_restart: true
    health_check_interval: 30
    timeout: 60

  dgm_trading_v1:
    port: 8082
    enabled: true
    auto_restart: true
    health_check_interval: 30
    timeout: 60

  dgm_trading_v2:
    port: 8083
    enabled: true
    auto_restart: true
    health_check_interval: 30
    timeout: 60

  advanced_dgm_evolution:
    port: 8087
    enabled: true
    auto_restart: true
    health_check_interval: 30
    timeout: 120  # Longer timeout for evolution processes

  neural_architecture_search:
    port: 8088
    enabled: true
    auto_restart: true
    health_check_interval: 30
    timeout: 120  # Longer timeout for NAS processes

# Advanced DGM Evolution Engine Configuration
evolution_engine:
  # Meta-Learning Parameters
  meta_learning:
    enabled: true
    adaptation_steps: 10
    learning_rate: 0.01
    task_types: ['classification', 'regression', 'reinforcement']
    few_shot_samples: 5

  # Self-Modification Parameters
  self_modification:
    enabled: true
    safety_checks: true
    max_modifications_per_session: 5
    allowed_modification_types: ['architecture', 'parameters', 'algorithms']
    rollback_on_failure: true

  # Evolution Parameters
  evolution:
    default_generations: 50
    default_population_size: 100
    default_mutation_rate: 0.15
    default_crossover_rate: 0.8
    elite_percentage: 0.1
    diversity_threshold: 0.05

# Neural Architecture Search Configuration
neural_architecture_search:
  # DARTS Configuration
  darts:
    enabled: true
    search_space: 'macro'  # 'macro' or 'micro'
    epochs: 50
    batch_size: 64
    learning_rate: 0.025
    weight_decay: 3e-4
    momentum: 0.9
    channels: 16
    layers: 8

  # Evolutionary Search Configuration
  evolutionary:
    enabled: true
    population_size: 50
    generations: 100
    mutation_rate: 0.2
    crossover_rate: 0.8
    tournament_size: 3
    elitism_ratio: 0.1

  # Progressive Search Configuration
  progressive:
    enabled: true
    initial_channels: 8
    max_channels: 64
    channel_growth_factor: 2
    complexity_stages: 4
    epochs_per_stage: 25

# DGM Trading Configuration
trading:
  # Trading Algorithm v1
  v1:
    enabled: true
    risk_threshold: 0.02
    max_position_size: 0.1
    stop_loss: 0.05
    take_profit: 0.15

  # Trading Algorithm v2
  v2:
    enabled: true
    risk_threshold: 0.015
    max_position_size: 0.15
    stop_loss: 0.04
    take_profit: 0.20
    adaptive_parameters: true
    sentiment_analysis: true

# A2A (Agent-to-Agent) Communication
a2a_communication:
  enabled: true
  protocol: 'http'  # 'http' or 'websocket'
  heartbeat_interval: 10
  timeout: 30
  max_retries: 3

  # Service endpoints for A2A communication
  endpoints:
    evolution_connector: 'http://localhost:8081'
    trading_v1: 'http://localhost:8082'
    trading_v2: 'http://localhost:8083'
    advanced_evolution: 'http://localhost:8087'
    neural_search: 'http://localhost:8088'

# Logging Configuration
logging:
  level: 'INFO'  # DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  file_logging: true
  log_directory: 'logs'
  max_log_size: '10MB'
  backup_count: 5

# Database Configuration
database:
  type: 'sqlite'  # sqlite, postgresql, mysql
  path: 'data/advanced_dgm_system.db'
  connection_pool_size: 10
  echo: false  # Set to true for SQL query logging

# Performance Configuration
performance:
  # CPU and Memory limits
  max_cpu_percent: 80
  max_memory_percent: 70

  # Concurrency settings
  max_concurrent_evolution_processes: 3
  max_concurrent_nas_searches: 2
  max_concurrent_trading_algorithms: 5

  # Caching
  enable_caching: true
  cache_size: 1000
  cache_ttl: 3600  # seconds

# Security Configuration
security:
  # API Security
  enable_api_key_auth: false  # Set to true in production
  api_keys: []

  # CORS settings
  enable_cors: true
  allowed_origins: ['http://localhost:*']

  # Rate limiting
  enable_rate_limiting: true
  requests_per_minute: 100

# Monitoring and Alerting
monitoring:
  enabled: true
  metrics_collection_interval: 60  # seconds
  health_check_interval: 30  # seconds

  # Metrics to collect
  collect_metrics:
    - 'service_health'
    - 'response_times'
    - 'error_rates'
    - 'resource_usage'
    - 'evolution_progress'
    - 'trading_performance'

  # Alerting thresholds
  alert_thresholds:
    service_down_alert: 1  # Alert if any service is down
    high_error_rate: 0.05  # Alert if error rate > 5%
    high_response_time: 5.0  # Alert if avg response time > 5 seconds
    high_cpu_usage: 0.9  # Alert if CPU usage > 90%
    high_memory_usage: 0.9  # Alert if memory usage > 90%

# Development and Debug Settings
development:
  debug_mode: false
  enable_hot_reload: false
  mock_external_services: false
  verbose_logging: false

  # Testing configuration
  run_integration_tests_on_startup: true
  test_timeout: 300  # seconds

# Backup and Recovery
backup:
  enabled: true
  backup_interval: 3600  # seconds (1 hour)
  backup_directory: 'backups'
  max_backup_files: 24  # Keep 24 hourly backups

  # What to backup
  backup_items:
    - 'database'
    - 'logs'
    - 'configuration'
    - 'evolution_results'
    - 'nas_results'

# External Integrations
integrations:
  # MCP (Model Context Protocol) Integration
  mcp:
    enabled: true
    server_url: 'http://localhost:8080'
    timeout: 30

  # Claudia Integration
  claudia:
    enabled: true
    model: 'claude-3-sonnet'
    api_key: ''  # Set via environment variable

  # Ollama Integration
  ollama:
    enabled: true
    base_url: 'http://localhost:11434'
    models: ['codellama', 'llama2', 'mistral']

  # External APIs
  external_apis:
    finnhub:
      enabled: false
      api_key: ''

    alpha_vantage:
      enabled: false
      api_key: ''

# Deployment Configuration
deployment:
  environment: 'development'  # development, staging, production

  # Docker configuration
  docker:
    enabled: false
    image_name: 'mcpvotsagi/advanced-dgm'
    tag: 'latest'

  # Kubernetes configuration
  kubernetes:
    enabled: false
    namespace: 'dgm-system'
    replicas: 1

  # Load balancing
  load_balancing:
    enabled: false
    algorithm: 'round_robin'  # round_robin, least_connections, ip_hash
