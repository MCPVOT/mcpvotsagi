name: Daily Trading System Sync

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update all components'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  sync-tradingagents:
    name: Sync TradingAgents Updates
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/kabrony/TradingAgents.git || true
          git fetch upstream
          
      - name: Check for updates
        id: check
        run: |
          CURRENT_SHA=$(git rev-parse HEAD:TradingAgents 2>/dev/null || echo "none")
          UPSTREAM_SHA=$(git ls-remote upstream main | cut -f1)
          
          if [ "$CURRENT_SHA" != "$UPSTREAM_SHA" ] || [ "${{ inputs.force_update }}" == "true" ]; then
            echo "updates_available=true" >> $GITHUB_OUTPUT
            echo "Updates available from upstream"
          else
            echo "updates_available=false" >> $GITHUB_OUTPUT
            echo "No updates available"
          fi
          
      - name: Merge upstream changes
        if: steps.check.outputs.updates_available == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Merge upstream changes
          git subtree pull --prefix=TradingAgents upstream main --squash -m "chore: sync TradingAgents from upstream"
          
      - name: Update integration files
        if: steps.check.outputs.updates_available == 'true'
        run: |
          python scripts/update_tradingagents_integration.py
          
      - name: Run integration tests
        if: steps.check.outputs.updates_available == 'true'
        run: |
          pip install -r requirements.txt
          pip install -r TradingAgents/requirements.txt
          python -m pytest tests/test_tradingagents_integration.py -v
          
      - name: Commit changes
        if: steps.check.outputs.updates_available == 'true'
        run: |
          git add -A
          git commit -m "chore: daily TradingAgents sync and integration update" || echo "No changes to commit"
          
      - name: Push changes
        if: steps.check.outputs.updates_available == 'true'
        run: |
          git push origin main

  update-solana-docs:
    name: Update Solana Documentation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Update Solana docs
        run: |
          cd solana-docs
          git pull origin main || echo "No updates"
          
      - name: Process docs for knowledge base
        run: |
          python scripts/process_solana_docs.py
          
      - name: Commit doc updates
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "chore: update Solana documentation" || echo "No changes"
          git push origin main

  update-market-data:
    name: Update Market Data Cache
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Update market data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: |
          python scripts/update_market_data.py
          
      - name: Upload market data artifact
        uses: actions/upload-artifact@v3
        with:
          name: market-data-${{ github.run_id }}
          path: data/market_data/
          retention-days: 7

  test-system-health:
    name: Test System Health
    runs-on: ubuntu-latest
    needs: [sync-tradingagents, update-solana-docs]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          cd claudia && npm install
          
      - name: Run backend tests
        run: |
          python test_backend_system.py
          
      - name: Check MCP server configurations
        run: |
          python scripts/validate_mcp_configs.py
          
      - name: Generate health report
        run: |
          python scripts/generate_health_report.py > health_report.md
          
      - name: Upload health report
        uses: actions/upload-artifact@v3
        with:
          name: health-report-${{ github.run_id }}
          path: health_report.md

  deploy-to-codespaces:
    name: Deploy to Codespaces
    runs-on: ubuntu-latest
    needs: test-system-health
    if: github.event.inputs.force_update == 'true' || github.event_name == 'schedule'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create Codespace configuration
        run: |
          cat > .devcontainer/devcontainer.json << EOF
          {
            "name": "MCPVotsAGI Trading System",
            "image": "mcr.microsoft.com/devcontainers/python:3.11",
            "features": {
              "ghcr.io/devcontainers/features/node:1": {
                "version": "18"
              },
              "ghcr.io/devcontainers/features/docker-in-docker:2": {}
            },
            "postCreateCommand": "bash scripts/setup_codespace.sh",
            "customizations": {
              "vscode": {
                "extensions": [
                  "ms-python.python",
                  "ms-python.vscode-pylance",
                  "esbenp.prettier-vscode",
                  "dbaeumer.vscode-eslint"
                ]
              }
            },
            "forwardPorts": [3011, 3005, 3002, 3001, 8020, 5678],
            "portsAttributes": {
              "3011": {"label": "Oracle AGI Dashboard"},
              "3005": {"label": "Solana MCP"},
              "3002": {"label": "Memory MCP"},
              "8020": {"label": "n8n Integration"}
            }
          }
          EOF
          
      - name: Create setup script
        run: |
          mkdir -p scripts
          cat > scripts/setup_codespace.sh << 'EOF'
          #!/bin/bash
          echo "Setting up MCPVotsAGI Trading System..."
          
          # Install Python dependencies
          pip install -r requirements.txt
          pip install -r TradingAgents/requirements.txt
          
          # Install Ollama
          curl -fsSL https://ollama.ai/install.sh | sh
          
          # Pull DeepSeek model
          ollama pull hf.co/unsloth/DeepSeek-R1-0528-Qwen3-8B-GGUF:Q4_K_XL
          
          # Setup n8n
          npm install -g n8n
          
          # Initialize databases
          python scripts/init_databases.py
          
          echo "Setup complete!"
          EOF
          
          chmod +x scripts/setup_codespace.sh
          
      - name: Commit Codespace config
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .devcontainer/ scripts/setup_codespace.sh
          git commit -m "chore: update Codespace configuration" || echo "No changes"
          git push origin main

  notify-completion:
    name: Notify Completion
    runs-on: ubuntu-latest
    needs: [deploy-to-codespaces]
    if: always()
    
    steps:
      - name: Send notification
        run: |
          echo "Daily sync completed at $(date)"
          # In production, would send to Slack/Discord/Email
          
      - name: Create summary
        run: |
          cat > $GITHUB_STEP_SUMMARY << EOF
          # Daily Sync Summary
          
          - **Date**: $(date)
          - **TradingAgents Sync**: ${{ needs.sync-tradingagents.result }}
          - **Solana Docs Update**: ${{ needs.update-solana-docs.result }}
          - **Market Data Update**: ${{ needs.update-market-data.result }}
          - **System Health**: ${{ needs.test-system-health.result }}
          - **Codespace Deploy**: ${{ needs.deploy-to-codespaces.result }}
          
          ## Next Steps
          1. Review health report artifact
          2. Check any failed jobs
          3. Monitor system performance
          EOF